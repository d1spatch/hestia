name: Blueberry Cheesecake
serves: 6 servings
tags: [dessert, cake]

ingredients:
  - group: Filling
    items:
      - item: cream cheese
        amount: 300
        unit: g
      - item: heavy cream
        amount: 180
        unit: g
      - item: sugar
        amount: 90
        unit: g
      - item: egg
        amount: 100
        unit: g
        note: "Two Large Eggs"
      - item: vanilla extract
        amount: 1
        unit: tsp
      - item: lemon zest
        amount: 1
        unit: tsp
        optional: true
  - group: Crust
    items:
      - item: BelVita Breakfast Biscuit
        amount: 350
        unit: g
      - item: butter
        amount: 110
        unit: g
  - group: Compote
    items:
      - item: blueberries
        amount: 300
        unit: g
      - item: maple syrup
        amount: 70
        unit: g
      - item: vanilla extract
        amount: 0.5
        unit: tsp
      - item: lemon juice
        amount: 1
        unit: tbsp

instructions:
  Crust:
    - Crush biscuits and mix with melted butter. Press into pan and chill.
  Filling:
    - Add all ingredients and mix.
    - Try not to overmix, as little air as possible.
    - Preheat oven to 350°F.
    - Pour into crust and bake until internal temp of 145°F, about 50 minutes.
  Compote:
    - Mix all ingredients with half of blueberries and cook over medium heat until thickened, about 10 minutes.
    - Use immersion blender to break up blueberries, then add remaining blueberries.
    - Add to cheesecake when serving.

notes: |
  - I like to use a springform pan for this, but you can also use a regular cake pan and line it with parchment paper.
  - USE A THERMOMETER. Temperatures seem to vary wildly. Sometimes it finishes in 30 minutes. Stove directions are always unreliable, cook to temp.
  - I'm going to try to add goat cheese next.
