name: Black Beans
serves: 15
total_recipe_grams: 2500
tags: [side dish, beans, not_fodmap]

ingredients:
  - name: black beans
    amount: 2
    unit: lb
  - name: water
    amount: 3
    unit: lb
    note: "enough to cover the beans by about 1 inches"
  - name: salt
    amount: 1
    unit: tsp
    note: "add more to taste at the end, turns out there's a lot"
  - name: garlic
    amount: 30
    unit: g
    note: "1 square of garlic, minced"
  - name: sweet onion
    amount: 1
    unit: cup
    note: "about one medium onion, diced"
  - name: better than bouillon, chicken
    amount: 2
    unit: tbsp
  - name: cajun seasoning
    amount: 1
    unit: tbsp
  - name: black pepper
    amount: 1
    unit: tbsp
  - name: lime
    amount: 0.5
    unit: unit
  - name: bay leaves
    amount: 3
    unit: unit
    
instructions:
  - Rinse the beans in a bowl and drain until water is clear. Remove any bad beans or debris.
  - Put beans, garlic, onion, salt, pepper, and bay leaves in a pressure cooker and cover with water.
  - Add more spices like cumin, cajun seasoning, or chili powder if desired.
  - Place in pressure cooker and cook.
  - Release the pressure then cover with lid and simmer the water until the bean juices becomes thick.
  

notes: |
  - This is a meal prep recipe, cut this down to like... 1/4th for a normal meal.
  - You don't need to soak the beans, it almost doesn't matter how long you soak them, you still have to simmer them at the end to make them soft and this is where the beans seem to absorb the most water.
  - When you simmer, put it on as low as it will go and close the lid to steam.
  - I'm still working on the weird smell. Bay leaves definitely help.
  - I'm still figuring out the seasoning. I think Cajun and pepper is the way to go but its still missing something.
