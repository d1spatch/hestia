name: Black Beans
serves: 20
tags: [side dish, beans, not_fodmap]

ingredients:
  - name: black beans
    amount: 2
    unit: lb
  - name: water
    amount: 2
    unit: lb
    note: "enough to cover the beans by about 2 inches"
  - name: salt
    amount: .5
    unit: tsp
    note: "add more to taste at the end, turns out there's a lot"
  - name: garlic
    amount: 30
    unit: g
    note: "1 square of garlic, minced"
  - name: sweet onion
    amount: 1
    unit: cup
    note: "about one medium onion, diced"
  - name: better than bouillon, chicken
    amount: 2
    unit: tbsp
  - name: cajun seasoning
    amount: 1
    unit: tbsp
  - name: black pepper
    amount: 2
    unit: tsp
  - name: lime
    amount: 0.5
    unit: unit
  - name: bay leaves
    amount: 3
    unit: unit
    
instructions:
  - Rinse the beans in a fine mesh strainer and pick out any debris.
  - Put beans, garlic, onion, salt, pepper, and bay leaves in a pressure cooker and cover with water.
  - Place in pressure cooker and cook.
  - Release the pressure then simmer the water until it becomes thick.
  - Add more spices like cumin, cajun seasoning, or chili powder if desired.

notes: |
  - This is a meal prep recipe, cut this down to like... 1/4th for a normal meal.
  - You don't need to soak the beans, it almost doesn't matter how long you soak them, you still have to simmer them at the end to make them soft.
  - When you simmer, put it on as low as it will go and close the lid to steam. Don't check more than every 10-15 minutes. What you'll notice is that while the water level is going down, the beans are getting more "drowned" in the water as it absorbs the water and some of them turn to mush.
  - I'm still working on the weird smell. Bay leaves definitely help.
  - I'm still figuring out the seasoning. I think Cajun and pepper is the way to go but its still missing something.
  - the 3:2 ratio of cajun to black pepper isn't important, play around, but having at least a half tsp of salt is. Put more to taste.