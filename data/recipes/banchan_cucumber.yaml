name: Cucumber Banchan
serves: 20 servings
tags: [banchan, vegetarian]

ingredients:
  - name: cucumber
    amount: 300
    unit: g
    note: "about 1 cucumber"
  - name: sugar
    amount: 2
    unit: tsp
  - name: vinegar
    amount: 2
    unit: tsp
  - name: soy sauce
    amount: 2
    unit: tsp
  - name: sesame oil
    amount: 2
    unit: tsp
  - name: crushed red pepper flakes
    amount: 1
    unit: tsp
    note: "wife likes it less spicy, so I use 1 tsp. Adjust to your preference."
  - name: salt
    amount: 2
    unit: tsp
    nutrition_pct: 50.0
  - name: garlic
    amount: 30
    unit: g
    note: "approximately one square of garlic minced"
  - name: sweet onion
    amount: 0.25
    unit: cup
    note: "about a 4th of an onion, thinly sliced"
  - name: sesame seeds
    amount: 3
    unit: g
    note: "Just enough to cover everything. I don't measure this."
  - name: black pepper
    amount: 1
    unit: pinch
    note: "to taste"

instructions:
  - Thinly slice the cucumber in a mandolin and put in metal bowl with salt. Toss to coat and let sit for 10 minutes.
  - Rinse the cucumber under cold water to remove excess salt. Drain and pat dry with paper towels.
  - Once dry, add the cucumber back to the bowl and toss with sugar, white vinegar, soy sauce, crushed red pepper flakes, and sesame oil until well coated.
  - Add garlic and sliced onions if desired.
  - Add 1/8th teaspoon of capsaicin powder if you want it spicier.
  - Squish into mason jar, fill to top with liquid, and let sit in the fridge for at least a day before serving.
  - Can be stored in the fridge for up to 2 week.

notes: |
  - Using frozen garlic is fine.
  - Haejin really hates when I add tequila to this recipe.
  - The idea is one cucumber fits nicely into a mason jar, and the liquid just barely covers all the cucumber. You can add chili oil or capsaicin powder if you want it spicier, but I find that the crushed red pepper flakes are enough for me.
