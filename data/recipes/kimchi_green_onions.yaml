name: Green Onion Kimchi
serves: 20
tags: [banchan, vegetable, kimchi]

ingredients:
  - name: green onion
    amount: 900
    unit: g
    note: "About 9 bunches of green onion."
  - name: crushed red pepper flakes
    amount: 2
    unit: tbsp
  - name: fish sauce
    amount: 100
    unit: ml
  - name: sweet onion
    amount: .25
    unit: cup
    note: "about a 4th of an onion, sliced"
  - name: pear
    amount: 0.25
    unit: cup
    note: "about a 4th of an pear, sliced"
  - name: ginger
    amount: 50
    unit: g
    note: "approximately one square of ginger, minced"
  - name: sugar
    amount: 2
    unit: tbsp
    note: "substitute plum syrup"

instructions:
  - Trim the roots and any wilted parts off the green onions, then cut into 2 inch pieces (if container is too small) and also length-wise (if thick American style green onions).
  - Add the green onions to a large bowl and toss with half the fish sauce. Wait 15 minutes.
  - Blend the remaining fish sauce with the sliced onions, sliced pear, minced ginger, and sugar until smooth.
  - Coat the green onions with the blended sauce, place in container and store in refrigerator for at least a day before serving.
  - Can be stored in the fridge for up to 1 week.

notes: |
  - I usually buy this on sale 3 for 1.
  - You should use gochugaru, but if you don't have it, you can take red chili flakes, grind them, and they're almost the same.
  - I like to add a little bit of capsaicin powder if I want it spicier.
  - Source: https://www.koreanbapsang.com/oi-muchim-korean-style-cucumber-salad/ without red pepper spice.