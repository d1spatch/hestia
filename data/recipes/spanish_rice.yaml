name: Spanish Rice
serves: 15
total_recipe_grams: 3000

tags: [side dish, rice]

ingredients:
  - name: long grain white rice
    amount: 2
    unit: lb
  - name: sweet onion
    amount: 1
    unit: cup
  - name: sweet corn  
    amount: 432
    unit: g
    note: "1 can of sweet corn, keeping the liquid"
  - name: garlic
    amount: 30
    unit: g
    note: "approximately one square of garlic minced, sometimes i double it"
  - name: jalapeno
    amount: 50
    unit: g
    note: "asian peppers seem to work better"
  - name: tomato paste
    amount: 12
    unit: oz
    note: "2 cans of tomato paste"
#  - name: chicken broth
#    amount: 32
#    unit: oz
#    note: "About one costco carton of chicken broth or eqiuivalent better than bullion"
  - name: better than bouillon, chicken
    amount: 2
    unit: tbsp
    note: "If you substitute with chicken broth, use 32 oz of chicken broth and omit the water and salt."
  - name: water
    amount: 2 
    unit: lb
    note: "If you substitute with chicken broth, omit the water."
  - name: salt
    amount: 2
    unit: tsp
    note: "To taste. I tried without it and it was pretty bland."
  - name: black pepper
    amount: 2
    unit: tsp
    note: "To taste."

instructions:
  - Rinse the rice in a fine mesh strainer until the water runs clear. Drain well.
  - in a 6-8 quart pot, heat a few tablespoons of oil over medium heat. Add the onion and cook until softened, about 5 minutes. Add the garlic and jalapeno and cook for another minute until fragrant.
  - They say to toast the rice in oil before cooking, but I skip this step and just add the rice to the pot with the other ingredients.
  - Add all ingredients to a large pot and stir to combine. Bring to a boil, then reduce to a simmer and cover with a tight fitting lid.
  - Simmer for 15 minutes, let it steam. DO NOT OPEN THE LID.
  - Fluff with chopstick to aerate the rice and serve.

notes: |
  - This is a meal prep recipe, cut this down to like... 1/4th for a normal meal.
  - Don't open in the middle of cooking! The steam is what cooks the rice, so opening the lid will let the steam escape and can ruin the result.
  - Put the temperature as low as possible while steaming to prevent burning the bottom.
  - I like to add some chopped cilantro and a squeeze of lime juice when serving.
  - No salt was terrible. Also Jalopenos don't work as well as Asian red chili peppers and green peppers. I will retry with those again and update the recipe.