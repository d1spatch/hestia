site_name: Hestia Cookbook
site_description: Precision cookbook CLI — recipes, ingredients, nutrition.
site_author: Hestia

theme:
  name: material
  palette:
    - scheme: default
      primary: brown
      accent: deep-orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: brown
      accent: deep-orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            show_symbol_type_heading: true
            docstring_style: google
            members_order: source

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - User Guide:
      - Recipes: guide/recipes.md
      - Ingredients: guide/ingredients.md
      - Rendering Output: guide/rendering.md
  - CLI Reference: reference/cli.md
  - API Reference:
      - recipe.py: reference/recipe.md
      - catalog.py: reference/catalog.md
      - renderer.py: reference/renderer.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
