name: Deploy Hestia to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install hestia
        run: pip install -e .

      - name: Install docs dependencies
        run: pip install mkdocs-material mkdocstrings[python]

      - name: Build app static site
        run: hestia build --base-url /${{ github.event.repository.name }}/ --output _site

      - name: Build documentation
        run: mkdocs build --site-dir _site/docs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
