name: Deploy Hestia to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "hestia/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install hestia
        run: pip install -e ./hestia

      - name: Build static site
        run: |
          cd hestia
          python -m hestia build \
            --base-url /${{ github.event.repository.name }}/ \
            --output _site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: hestia/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
